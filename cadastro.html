<!doctype html>
<html lang="pt-br">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />

   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
   <link rel="stylesheet" href="./styles/cadastro.css" />

   <link rel="icon" href="/image/logo i9lar.png" type="image/png">

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

   <title>Cadastro - I9lar</title>
</head>

<body>

   <header>
       <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="./image/logoBilhar.jpeg" alt="Logo" width="40" class="me-2">
                I9lar Mesas de Bilhar
            </a>

            <div class="d-flex align-items-center">

                <button class="navbar-toggler me-2" type="button"
                        data-bs-toggle="offcanvas"
                        data-bs-target="#menuLateral">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="O que você procura?">
                    <button class="btn btn-warning" type="submit">Procurar</button>
                </form>


            </div>

        </div>
    </nav>

      <!-- MENU LATERAL -->

      <div class="offcanvas offcanvas-start text-bg-dark"
         tabindex="-1"
         id="menuLateral">

         <div class="offcanvas-header">

            <h5 class="offcanvas-title">Menu</h5>

            <button type="button"
               class="btn-close btn-close-white"
               data-bs-dismiss="offcanvas">
            </button>

         </div>

         <div class="offcanvas-body">

            <ul class="navbar-nav">

               <li class="nav-item">
                  <a class="nav-link text-white" href="index.html">
                     <i class="bi bi-house"></i> Home
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link text-white" href="sobre.html">
                     <i class="bi bi-person"></i> Sobre
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link text-white" href="produtos.html">
                     <i class="bi bi-9-circle"></i> Produtos
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link text-white" href="contato.html">
                     <i class="bi bi-telephone"></i> Contato
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link text-white" href="login.html">
                     <i class="bi bi-person-fill"></i> Login
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link text-white" href="cadastro.html">
                     <i class="bi bi-person-fill-add"></i> Cadastro
                  </a>
               </li>

            </ul>

         </div>
      </div>
   </header>

   <!-- MAIN -->

   <main class="container py-5">

      <h1 class="text-center mb-4">
         Cadastrar
      </h1>

      <!-- REDES -->

      <section class="social d-flex justify-content-center gap-3 flex-wrap mb-5">

         <a href="#" id="google">
            <img src="./image/google.png" class="img" alt="Google">
         </a>

         <a href="#" id="facebook">
            <img src="./image/facebook.png" class="img" alt="Facebook">
         </a>

         <a href="#" id="linkedin">
            <img src="./image/linkedin.png" class="img" alt="Linkedin">
         </a>

      </section>

      <!-- FORMULÁRIO -->

      <section class="row justify-content-center g-4">

         <!-- COLUNA 1 -->

         <form class="col-12 col-md-6">

            <div class="input-container">
               <input type="text" id="Nome" class="input-field" />
               <label for="Nome" class="input-label">
                  Nome completo
               </label>
            </div>

            <div class="input-container">
               <input type="text" id="Email" class="input-field" />
               <label for="Email" class="input-label">
                  Email
               </label>
            </div>

            <div class="input-container">
               <input type="password" id="Senha" class="input-field" />
               <label for="Senha" class="input-label">
                  Senha
               </label>
            </div>

            <div class="input-container">
               <input type="password" id="Confirmar" class="input-field" />
               <label for="Confirmar" class="input-label">
                  Confirmar senha
               </label>
            </div>

         </form>

         <!-- COLUNA 2 -->

         <form class="col-12 col-md-6">

            <div class="input-container">
               <input type="text" id="Telefone" class="input-field" />
               <label for="Telefone" class="input-label">
                  Telefone
               </label>
            </div>

            <div class="input-container">
               <input type="date" id="Data" class="input-field" />
               <label for="Data" class="input-label">
                  Data de nascimento
               </label>
            </div>

            <div class="input-container">

               <select id="cidade" class="input-field">

                  <option value="">Selecionar...</option>
                  <option>São Paulo</option>
                  <option>Campinas</option>
                  <option>Sumaré</option>
                  <option>Hortolândia</option>

               </select>

               <label for="cidade" class="input-label">
                  Cidade
               </label>

            </div>

            <div class="input-container">
               <input type="text" id="Numero" class="input-field" />
               <label for="Numero" class="input-label">
                  Número da residência
               </label>
            </div>

         </form>

      </section>

      <!-- BOTÃO -->

      <div class="text-center mt-4">

         <input value="Cadastrar"
            type="submit"
            onclick="Funcao(); return false"
            class="input-field w-100"
            style="max-width: 200px; height: 45px;">

      </div>

      <!-- LOGIN -->

      <div class="login d-flex justify-content-center align-items-center flex-wrap text-center mt-4">

         <p class="me-2 mb-0">
            Já tem uma conta?
         </p>

         <a href="login.html">
            Entre
         </a>

      </div>

   </main>

   <!-- FOOTER -->

   <footer class="bg-dark text-white text-center py-3">

      <p class="mb-0">
         &copy; I9lar Mesas de Bilhar
         <br>
         CNPJ 54.887.300/0001-63
      </p>

   </footer>

</body>
</html>
