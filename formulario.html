<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="./styles/formulario.css"/>
    <title>Formulário</title>
    
</head>
<body>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Solicite seu Orçamento</h1>
        <form action="#" method="post" autocomplete="off" id="orcamentoForm" class="mx-auto" style="max-width: 600px;">
            <div class="mb-3">
                <label for="Nome" class="form-label">Nome</label>
                <input type="text" name="Nome" id="Nome" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="Sobrenome" class="form-label">Sobrenome</label>
                <input type="text" name="Sobrenome" id="Sobrenome" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="E-mail" class="form-label">E-mail</label>
                <input type="email" name="E-mail" id="E-mail" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="Telefone" class="form-label">Telefone</label>
                <input type="tel" name="Telefone" id="Telefone" class="form-control">
            </div>

            <div class="mb-3">
                <label for="Mensagem" class="form-label">Mensagem</label>
                <textarea name="Mensagem" id="Mensagem" class="form-control" rows="4" placeholder="Descreva seu pedido de orçamento"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">Enviar</button>
        </form>
    </div>

      <script>
        document.getElementById('orcamentoForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Obrigado! Seu pedido de orçamento foi enviado. Entraremos em contato em breve.');
            this.reset();
        });
      </script>

</body>
</html>
