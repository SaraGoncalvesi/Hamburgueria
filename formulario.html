<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- ICONS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./styles/formulario.css">
    <title>Solicite o seu Orçamento</title>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="./image/logoBilhar.jpeg"
                     width="40"
                     class="me-2 rounded-circle">

                I9lar Mesas de Bilhar
            </a>
        </div>
    </nav>


    <!-- BANNER -->
    <section class="banner-formulario">

        <div>
            <h1>Solicite seu Orçamento</h1>
            <p>Mesas profissionais para sua área de lazer </p>

        </div>
    </section>


    <!-- FORMULÁRIO -->
    <section class="container py-5">
        <div class="row justify-content-center">
        <div class="col-lg-8">
        <div class="card shadow-lg border-0 formulario-card">
        <div class="card-body p-5">

            <h2 class="text-center mb-4">
                Formulário de Orçamento
            </h2>

            <form id="orcamentoForm">

                    <!-- NOME -->
                     <div class="mb-3">
                        <label class="form-label">
                            Nome
                        </label>

                            <input type="text"
                                   class="form-control"
                                   required>
                            </div>

                    <!-- EMAIL -->
                     <div class="mb-3">
                        <label class="form-label">
                            Email
                        </label>

                            <input type="email"
                                    class="form-control"
                                    required>
                            </div>

                    <!-- TELEFONE -->
                     <div class="mb-3">
                        <label class="form-label">
                            Telefone
                        </label>

                            <input type="tel"
                                    class="form-control">
                            </div>

            <!-- TIPOS DE MESA -->
            <div class="mb-4">
            <label class="form-label d-block mb-3">
                    Tipo de Mesa
            </label>

                <div class="row g-3">

                    <div class="col-md-4"> 
                     <!-- OPÇÃO 1 -->
                    <label class="form-check checkbox-card"> 

                        <input class="form-check-input"
                                type="checkbox"
                                id="rede">

                         <span class="form-check-label">
                                Mesa de Rede
                         </span>
                    </label>
                    </div>   


                    <div class="col-md-4">  
                    <!-- OPÇÃO 2 -->
                    <label class="form-check checkbox-card">    

                        <input class="form-check-input"
                                type="checkbox"
                                id="redeGrande">

                         <span class="form-check-label">
                                Mesa de Rede Grande
                         </span>

                    </label>
                    </div>    


                    <div class="col-md-4"> 
                    <!-- OPÇÃO 3 -->
                    <label class="form-check checkbox-card"> 

                        <input class="form-check-input"
                                type="checkbox"
                                id="cacapa">

                         <span class="form-check-label">
                            Mesa de Caçapa
                         </span>
                         
                    </label>
                    </div>


                    <div class="col-md-4"> 
                    <!-- OPÇÃO 4 -->
                    <label class="form-check checkbox-card"> 

                        <input class="form-check-input"
                            type="checkbox"
                            id="cacapaGrande">

                        <span class="form-check-label">
                            Mesa de Caçapa Grande
                        </span>

                    </label>
                    </div>


                    <div class="col-md-4"> 
                    <!-- OPÇÃO 5 -->
                    <label class="form-check checkbox-card"> 

                        <input class="form-check-input"
                                type="checkbox"
                                id="pebolim">

                         <span class="form-check-label">                    
                            Pebolim
                        </span>
                    </label>
                    </div>    


                    <div class="col-md-4">
                    <!-- OPÇÃO 6 -->
                    <label class="form-check checkbox-card"> 
                        <input class="form-check-input"
                                type="checkbox"
                                id="tenis">

                         <span class="form-check-label">
                                Tênis de Mesa
                         </span>
                    </label>
                    </div>
        
                    
                </div>
            </div>


                    <!-- MENSAGEM -->
                    <div class="mb-4">
                        <label class="form-label">
                            Observações
                        </label>

                        <textarea class="form-control"
                            rows="4">
                        </textarea>
                    </div>

                    <!-- BOTÃO -->
                     <button type="submit"
                        class="btn btn-warning w-100">
                            Solicite seu Orçamento
                    </button>

            </form>

                    </div>

                </div>

            </div>

        </div>

    </section>


    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center p-4">

        © I9lar Mesas de Bilhar

    </footer>


    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    <!-- SCRIPT -->
    <script>

        document
            .getElementById("orcamentoForm")

            .addEventListener("submit", function(event){

                event.preventDefault();

                alert("Orçamento enviado!");

                this.reset();

            });

    </script>

</body>

</html>
